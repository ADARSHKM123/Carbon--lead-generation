services:
  - type: web
    name: carbon-outreach-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HIKER_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: deepseek
